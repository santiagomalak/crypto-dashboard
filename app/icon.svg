<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0d0d14"/>

  <!-- Candlestick chart: 4 candles -->

  <!-- Candle 1 (bearish, red) -->
  <!-- Wick -->
  <line x1="6" y1="6" x2="6" y2="26" stroke="#ef4444" stroke-width="1"/>
  <!-- Body -->
  <rect x="4" y="10" width="4" height="9" rx="0.5" fill="#ef4444"/>

  <!-- Candle 2 (bullish, green) -->
  <line x1="12" y1="8" x2="12" y2="25" stroke="#22c55e" stroke-width="1"/>
  <rect x="10" y="12" width="4" height="10" rx="0.5" fill="#22c55e"/>

  <!-- Candle 3 (bullish, green) -->
  <line x1="18" y1="5" x2="18" y2="22" stroke="#22c55e" stroke-width="1"/>
  <rect x="16" y="8" width="4" height="11" rx="0.5" fill="#22c55e"/>

  <!-- Candle 4 (bearish, red) -->
  <line x1="24" y1="7" x2="24" y2="24" stroke="#ef4444" stroke-width="1"/>
  <rect x="22" y="11" width="4" height="8" rx="0.5" fill="#ef4444"/>

  <!-- Bottom accent line -->
  <line x1="3" y1="28" x2="29" y2="28" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
</svg>
